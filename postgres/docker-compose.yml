version: '3.5'
volumes:
    postgres: {}
    # pgadmin: {}
services:
  postgres:
    container_name: postgres_container
    image: postgres
    env_file:
       - .env
    environment:
      PGDATA: /data/postgres
    volumes:
       - postgres:/data/postgres
    ports:
      - "15432:5432"
    networks:
      - postgres
    restart: unless-stopped
